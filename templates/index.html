<!DOCTYPE html>
<html>

<head>
    <title>Student Management</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f9;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .container {
            width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
        }

        button {
            padding: 8px 12px;
            margin-top: 5px;
            cursor: pointer;
        }

        .student {
            background: #eef;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
        }

        .actions button {
            margin-right: 5px;
        }
    </style>
</head>

<body>

    <h1>Student Management App</h1>

    <div class="container">
        <h3>Add Student</h3>
        <input type="text" id="name" placeholder="Name">
        <input type="number" id="age" placeholder="Age">
        <input type="text" id="hobbies" placeholder="Hobbies (comma separated)">
        <button onclick="addStudent()">Add Student</button>

        <hr>

        <h3>All Students</h3>
        <div id="students"></div>
    </div>

    <script>

        const API_URL = "http://127.0.0.1:5000";

        async function fetchStudents() {
            try {
                const response = await fetch("/get");

                if (!response.ok) {
                    throw new Error("HTTP error " + response.status);
                }
  
                const students = await response.json();
                console.log("Students:", students);

                const container = document.getElementById("students");
                container.innerHTML = "";

                students.forEach(student => {

                    let hobbiesText = "";

                    if (Array.isArray(student.hobbies)) {
                        hobbiesText = student.hobbies.join(", ");
                    } else if (typeof student.hobbies === "string") {
                        hobbiesText = student.hobbies;
                    }

                    container.innerHTML += `
                        <div class="student">
                            <b>${student.name}</b> (Age: ${student.age})<br>
                            Hobbies: ${hobbiesText}<br>
                            <div class="actions">
                                <button onclick="deleteStudent('${student.id}')">Delete</button>
                                <button onclick="editStudent('${student.id}', '${student.name}', ${student.age})">Edit</button>
                            </div>
                        </div>
                    `;
                });

            } catch (error) {
                console.error("Error fetching students:", error);
            }
        }

        async function addStudent() {
            const name = document.getElementById("name").value;
            const age = document.getElementById("age").value;
            const hobbies = document.getElementById("hobbies").value.split(",");

            await fetch("/add", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, age: Number(age), hobbies })
            });

            fetchStudents();
        }

        async function deleteStudent(id) {
            await fetch("/delete/" + id, {
                method: "DELETE"
            });

            fetchStudents();
        }

        async function editStudent(id, oldName, oldAge) {
            const name = prompt("Enter new name", oldName);
            const age = prompt("Enter new age", oldAge);

            await fetch("/update/" + id, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, age: Number(age) })
            });

            fetchStudents();
        }

        fetchStudents();

    </script>

</body>

</html>
